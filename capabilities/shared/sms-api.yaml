naftiko: "1.0.0-alpha1"

info:
  label: "Vonage SMS API"
  description: "Send and receive SMS messages globally using Vonage's SMS API."
  tags:
    - Communication
    - Messaging
    - SMS
    - Telecommunications
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VONAGE_API_KEY: VONAGE_API_KEY
      VONAGE_API_SECRET: VONAGE_API_SECRET

capability:
  consumes:
    - type: http
      namespace: vonage-sms
      baseUri: https://rest.nexmo.com
      description: "Vonage SMS API for sending text messages globally."
      authentication:
        type: apikey
        key: api_key
        value: "{{VONAGE_API_KEY}}"
        placement: body
      resources:
        - name: sms
          path: /sms/json
          description: "Send outbound SMS messages."
          operations:
            - name: send-sms
              method: POST
              description: "Send an SMS message to a recipient."
              inputParameters:
                - name: to
                  in: body
                  type: string
                  required: true
                  description: "Recipient phone number in E.164 format."
                - name: from
                  in: body
                  type: string
                  required: true
                  description: "Sender phone number or alphanumeric name."
                - name: text
                  in: body
                  type: string
                  required: true
                  description: "The SMS message body."
                - name: type
                  in: body
                  type: string
                  required: false
                  description: "Message type: text, binary, or unicode."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: vonage-sms-rest
      resources:
        - path: /v1/sms
          name: sms
          description: "Send SMS messages."
          operations:
            - method: POST
              name: send-sms
              description: "Send an SMS message."
              call: "vonage-sms.send-sms"
              with:
                to: "rest.to"
                from: "rest.from"
                text: "rest.text"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: vonage-sms-mcp
      transport: http
      tools:
        - name: send-sms
          description: "Send an SMS message to a phone number."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "vonage-sms.send-sms"
          with:
            to: "tools.to"
            from: "tools.from"
            text: "tools.text"
          outputParameters:
            - type: object
              mapping: "$."
