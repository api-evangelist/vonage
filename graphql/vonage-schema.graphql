# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type Query {
  call(id: ID!): Call
  calls(status: CallStatus, pageSize: Int, recordIndex: Int): CallList
  callRecord(id: ID!): CallRecord
  message(id: ID!): Message
  messages(channel: MessageChannel, status: MessageStatus, pageSize: Int): MessageList
  verifyRequest(requestId: ID!): VerifyRequest
  application(id: ID!): Application
  applications(pageSize: Int, page: Int): ApplicationList
  number(msisdn: String!): PhoneNumber
  numbers(country: String, pattern: String, searchPattern: Int, type: NumberType, features: [NumberFeature!], size: Int, index: Int): NumberList
  ownedNumbers(country: String, applicationId: ID, size: Int, index: Int): OwnedNumberList
  insight(number: String!, level: InsightLevel!): Insight
  meetingSession(sessionId: ID!): MeetingSession
  user(id: ID!): User
  account: Account
  subAccounts: SubAccountList
}

type Mutation {
  createCall(input: CreateCallInput!): Call
  endCall(id: ID!): Call
  transferCall(id: ID!, destination: DestinationInput!): Call
  sendDTMF(id: ID!, digits: String!): DTMFResult
  startRecording(callId: ID!, input: RecordingInput): Recording
  stopRecording(recordingId: ID!): Recording
  sendMessage(input: SendMessageInput!): Message
  sendSMS(input: SendSMSInput!): SMSMessage
  requestVerify(input: VerifyInput!): VerifyRequest
  checkVerify(requestId: ID!, code: String!): VerifyCheck
  cancelVerify(requestId: ID!): VerifyRequest
  createApplication(input: CreateApplicationInput!): Application
  updateApplication(id: ID!, input: UpdateApplicationInput!): Application
  deleteApplication(id: ID!): Boolean
  searchNumbers(country: String!, type: NumberType, pattern: String, features: [NumberFeature!]): NumberList
  buyNumber(msisdn: String!, country: String!): PhoneNumber
  cancelNumber(msisdn: String!, country: String!): Boolean
  updateNumber(msisdn: String!, input: UpdateNumberInput!): PhoneNumber
  createMeetingSession(input: CreateSessionInput!): MeetingSession
  createUser(input: CreateUserInput!): User
  topUpBalance(input: TopUpInput!): TopUp
  createAPISecret(apiKey: String!): APISecret
  deleteAPISecret(apiKey: String!, secretId: ID!): Boolean
}

type Subscription {
  onCallEvent(callId: ID): Call
  onMessageDelivery(messageId: ID): Message
  onInboundMessage(number: String): InboundMessage
  onVerifyUpdate(requestId: ID!): VerifyRequest
  onSessionEvent(sessionId: ID!): MeetingSession
}
