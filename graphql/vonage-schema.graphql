# Vonage Communications APIs - Conceptual GraphQL Schema
# Covers: Voice, SMS, Messages, Verify, Numbers, Applications, Video, Conversations, Account
# Source: https://developer.vonage.com/

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar PhoneNumberScalar
scalar URL
scalar ISO8601Duration

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum CallDirection {
  INBOUND
  OUTBOUND
}

enum CallStatus {
  STARTED
  RINGING
  ANSWERED
  MACHINE
  COMPLETED
  TIMEOUT
  FAILED
  REJECTED
  CANCELLED
  BUSY
  UNANSWERED
}

enum LegStatus {
  STARTED
  RINGING
  ANSWERED
  COMPLETED
  FAILED
  TIMEOUT
  REJECTED
  CANCELLED
  BUSY
}

enum RecordingFormat {
  MP3
  OGG
}

enum MessageStatus {
  SUBMITTED
  DELIVERED
  READ
  REJECTED
  UNDELIVERABLE
  PENDING
  FAILED
}

enum MessageChannel {
  SMS
  MMS
  WHATSAPP
  MESSENGER
  VIBER_SERVICE
  RCS
}

enum NumberType {
  LANDLINE
  MOBILE_LVN
  TOLL_FREE
}

enum NumberFeature {
  SMS
  VOICE
  MMS
}

enum VerifyStatus {
  IN_PROGRESS
  SUCCESS
  FAILED
  EXPIRED
  CANCELLED
  INVALID_CODE
  WRONG_CODE_THROTTLED
  TOO_MANY_BIND_FAILURES
  UNROUTABLE
  ERROR
}

enum OTPChannel {
  SMS
  TTS
  WHATSAPP
  EMAIL
}

enum InsightLevel {
  BASIC
  STANDARD
  ADVANCED
}

enum NumberPortingStatus {
  PENDING
  PROCESSING
  COMPLETED
  FAILED
  CANCELLED
}

enum RoamingStatus {
  UNKNOWN
  ROAMING
  NOT_ROAMING
}

enum SessionArchiveMode {
  ALWAYS
  MANUAL
}

enum SessionMediaMode {
  RELAYED
  ROUTED
}

enum UserState {
  ACTIVE
  INACTIVE
  DELETED
}

enum MemberState {
  INVITED
  JOINED
  LEFT
  UNKNOWN
}

enum CapabilityType {
  VOICE
  MESSAGES
  RTC
  VBC
  VIDEO
  VERIFY
}

enum WebhookHTTPMethod {
  GET
  POST
}

enum BroadcastStreamType {
  HLS
  RTMP
}

enum NCCOActionType {
  TALK
  STREAM
  INPUT
  RECORD
  CONNECT
  CONVERSATION
  NOTIFY
}

# ─────────────────────────────────────────────
# Voice / Call Types
# ─────────────────────────────────────────────

type Call {
  uuid: ID!
  conversationUuid: ID
  direction: CallDirection!
  status: CallStatus!
  from: String!
  to: String!
  startTime: DateTime
  endTime: DateTime
  duration: Int
  rate: String
  price: String
  network: String
  legs: [Leg!]
  recordings: [Recording!]
  transcription: Transcription
}

type CallList {
  count: Int!
  pageSize: Int!
  recordIndex: Int!
  calls: [Call!]!
}

type CallRecord {
  uuid: ID!
  callUuid: ID!
  startTime: DateTime!
  endTime: DateTime
  price: String
  rate: String
  duration: Int
  network: String
  from: String!
  to: String!
  status: CallStatus!
}

type Leg {
  uuid: ID!
  callUuid: ID!
  type: String
  status: LegStatus!
  from: String
  to: String
  startTime: DateTime
  endTime: DateTime
  duration: Int
  network: String
  rate: String
  price: String
}

type DTMF {
  digits: String!
  timed_out: Boolean!
}

type DTMFResult {
  message: String!
  uuid: ID!
}

type Recording {
  uuid: ID!
  callUuid: ID
  legUuid: ID
  startTime: DateTime
  endTime: DateTime
  url: URL
  format: RecordingFormat
  size: Int
  status: String
}

type Transcription {
  uuid: ID!
  callUuid: ID!
  text: String
  language: String
  confidence: Float
  words: [TranscriptionWord!]
}

type TranscriptionWord {
  word: String!
  confidence: Float!
  startTime: Float!
  endTime: Float!
}

type SpeechRecognition {
  uuid: ID!
  type: String!
  language: String!
  results: [SpeechResult!]
  timeoutReason: String
}

type SpeechResult {
  transcript: String!
  confidence: Float!
}

type NCCOAction {
  action: NCCOActionType!
  text: String
  url: [URL!]
  eventUrl: [URL!]
  eventMethod: WebhookHTTPMethod
  bargeIn: Boolean
  digits: Int
  timeOut: Int
  loop: Int
  record: Boolean
  format: RecordingFormat
  endOnSilence: Int
  endOnKey: String
  beepStart: Boolean
}

