naftiko: 1.0.0-alpha2
info:
  label: Vonage Communications API — Messages
  description: 'Vonage Communications API — Messages. 2 operations. Lead operation: Send a Message. Self-contained Naftiko
    capability covering one Vonage business surface.'
  tags:
  - Vonage
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VONAGE_API_KEY: VONAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: vonage-messages
    baseUri: https://api.nexmo.com
    description: Vonage Communications API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: v1-messages
      path: /v1/messages
      operations:
      - name: sendmessage
        method: POST
        description: Send a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-messages-message_uuid
      path: /v1/messages/{message_uuid}
      operations:
      - name: updatemessage
        method: PATCH
        description: Update a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: message_uuid
          in: path
          type: string
          description: The UUID of the message.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.VONAGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: vonage-messages-rest
    port: 8080
    description: REST adapter for Vonage Communications API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/messages
      name: v1-messages
      description: REST surface for v1-messages.
      operations:
      - method: POST
        name: sendmessage
        description: Send a Message
        call: vonage-messages.sendmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/messages/{message-uuid}
      name: v1-messages-message-uuid
      description: REST surface for v1-messages-message_uuid.
      operations:
      - method: PATCH
        name: updatemessage
        description: Update a Message
        call: vonage-messages.updatemessage
        with:
          message_uuid: rest.message_uuid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vonage-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vonage Communications API — Messages. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: send-message
      description: Send a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: vonage-messages.sendmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-message
      description: Update a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: vonage-messages.updatemessage
      with:
        message_uuid: tools.message_uuid
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
