description: Vonage (part of Ericsson) provides cloud communications APIs for voice, SMS, messaging, video, and verification.
  The Vonage API platform enables businesses to embed communication capabilities into applications including voice calls,
  SMS, multi-channel messaging (WhatsApp, Messenger, Viber, RCS), video conferencing, and two-factor authentication. SDKs
  are available for Node.js, Python, Java, PHP, Ruby, .NET, Go, and Kotlin.
