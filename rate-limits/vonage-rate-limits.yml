specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Vonage
providerId: vonage
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Communications
description: Vonage API rate limits per account.
sources:
  - https://www.vonage.com/communications-apis/pricing/
  - https://developer.vonage.com/en/getting-started/concepts/rate-limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Messages API (default)
    scope: account
    metric: messages_per_second
    limit: 30
    timeFrame: second
  - name: SMS API
    scope: account
    metric: messages_per_second
    limit: 30
    timeFrame: second
  - name: Voice API
    scope: account
    metric: concurrent_calls
    limit: varies
  - name: Verify API
    scope: account
    metric: verifications_per_second
    limit: 30
    timeFrame: second
