naftiko: "1.0.0-alpha1"

info:
  label: "Vonage Numbers API"
  description: "Provision and manage virtual phone numbers globally."
  tags:
    - Communication
    - Number Management
    - Telecommunications
    - Virtual Numbers
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VONAGE_API_KEY: VONAGE_API_KEY
      VONAGE_API_SECRET: VONAGE_API_SECRET

capability:
  consumes:
    - type: http
      namespace: vonage-numbers
      baseUri: https://rest.nexmo.com
      description: "Vonage Numbers API for virtual number management."
      authentication:
        type: apikey
        key: api_key
        value: "{{VONAGE_API_KEY}}"
        placement: query
      resources:
        - name: account-numbers
          path: /account/numbers
          description: "List owned phone numbers."
          operations:
            - name: list-owned-numbers
              method: GET
              description: "Retrieve all inbound numbers associated with your Vonage account."
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "Filter by two-character country code."
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: "Number of results per page."
                - name: index
                  in: query
                  type: integer
                  required: false
                  description: "Page index."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: number-search
          path: /number/search
          description: "Search available numbers."
          operations:
            - name: search-available-numbers
              method: GET
              description: "Find inbound numbers available for purchase."
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: true
                  description: "Two-character country code."
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Number type: landline, mobile-lvn, landline-toll-free."
                - name: features
                  in: query
                  type: string
                  required: false
                  description: "Required features: SMS, VOICE, MMS."
                - name: pattern
                  in: query
                  type: string
                  required: false
                  description: "Pattern to filter numbers."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: number-buy
          path: /number/buy
          description: "Purchase a phone number."
          operations:
            - name: buy-number
              method: POST
              description: "Purchase a specific inbound number."
              inputParameters:
                - name: country
                  in: body
                  type: string
                  required: true
                  description: "Two-character country code."
                - name: msisdn
                  in: body
                  type: string
                  required: true
                  description: "Phone number to purchase (E.164)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: number-cancel
          path: /number/cancel
          description: "Cancel a phone number."
          operations:
            - name: cancel-number
              method: POST
              description: "Cancel subscription for a virtual number."
              inputParameters:
                - name: country
                  in: body
                  type: string
                  required: true
                  description: "Two-character country code."
                - name: msisdn
                  in: body
                  type: string
                  required: true
                  description: "Phone number to cancel."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: number-update
          path: /number/update
          description: "Update number configuration."
          operations:
            - name: update-number
              method: POST
              description: "Change the behavior of a number you own."
              inputParameters:
                - name: country
                  in: body
                  type: string
                  required: true
                  description: "Two-character country code."
                - name: msisdn
                  in: body
                  type: string
                  required: true
                  description: "Phone number to update."
                - name: mo_http_url
                  in: body
                  type: string
                  required: false
                  description: "Inbound SMS webhook URL."
                - name: voice_callback_type
                  in: body
                  type: string
                  required: false
                  description: "Voice routing type: sip, tel, app."
                - name: voice_callback_value
                  in: body
                  type: string
                  required: false
                  description: "Voice routing destination."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: vonage-numbers-rest
      resources:
        - path: /v1/numbers
          name: numbers
          description: "Manage virtual phone numbers."
          operations:
            - method: GET
              name: list-owned-numbers
              description: "List owned phone numbers."
              call: "vonage-numbers.list-owned-numbers"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/numbers/available
          name: available-numbers
          description: "Search available numbers."
          operations:
            - method: GET
              name: search-available-numbers
              description: "Search for available numbers to purchase."
              call: "vonage-numbers.search-available-numbers"
              with:
                country: "rest.country"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: vonage-numbers-mcp
      transport: http
      tools:
        - name: list-owned-numbers
          description: "List all virtual phone numbers owned by the account."
          hints:
            readOnly: true
            idempotent: true
          call: "vonage-numbers.list-owned-numbers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-available-numbers
          description: "Search for available phone numbers to purchase in a country."
          hints:
            readOnly: true
            idempotent: true
          call: "vonage-numbers.search-available-numbers"
          with:
            country: "tools.country"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
        - name: buy-number
          description: "Purchase a virtual phone number."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "vonage-numbers.buy-number"
          with:
            country: "tools.country"
            msisdn: "tools.msisdn"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-number
          description: "Cancel subscription for a virtual phone number."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "vonage-numbers.cancel-number"
          with:
            country: "tools.country"
            msisdn: "tools.msisdn"
          outputParameters:
            - type: object
              mapping: "$."
